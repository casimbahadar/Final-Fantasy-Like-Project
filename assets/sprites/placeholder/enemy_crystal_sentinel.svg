<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Crystal aura -->
  <rect x="6" y="6" width="36" height="36" fill="#7ce0ec" opacity="0.2"/>
  <rect x="2" y="14" width="44" height="20" fill="#7ce0ec" opacity="0.15"/>
  <!-- Floating crystal head -->
  <rect x="18" y="2" width="12" height="2" fill="#a8f0fc"/>
  <rect x="16" y="4" width="16" height="3" fill="#7ce0ec"/>
  <rect x="14" y="7" width="20" height="6" fill="#4cd8e0"/>
  <rect x="16" y="13" width="16" height="3" fill="#7ce0ec"/>
  <rect x="18" y="16" width="12" height="2" fill="#a8f0fc"/>
  <rect x="20" y="9" width="2" height="2" fill="#1a1015"/>
  <rect x="26" y="9" width="2" height="2" fill="#1a1015"/>
  <rect x="20" y="9" width="1" height="1" fill="#ffffff"/>
  <rect x="26" y="9" width="1" height="1" fill="#ffffff"/>
  <!-- Crystal core (chest gem) -->
  <rect x="20" y="22" width="8" height="10" fill="#4cd8e0"/>
  <rect x="22" y="24" width="4" height="6" fill="#a8f0fc"/>
  <rect x="23" y="25" width="2" height="2" fill="#ffffff"/>
  <!-- Floating crystal arms (separate from body) -->
  <rect x="6" y="18" width="6" height="3" fill="#4cd8e0"/>
  <rect x="3" y="20" width="6" height="3" fill="#7ce0ec"/>
  <rect x="0" y="22" width="6" height="3" fill="#4cd8e0"/>
  <rect x="36" y="18" width="6" height="3" fill="#4cd8e0"/>
  <rect x="39" y="20" width="6" height="3" fill="#7ce0ec"/>
  <rect x="42" y="22" width="6" height="3" fill="#4cd8e0"/>
  <!-- Suspended crystal "hands" -->
  <rect x="2" y="26" width="6" height="6" fill="#7ce0ec"/>
  <rect x="40" y="26" width="6" height="6" fill="#7ce0ec"/>
  <rect x="3" y="27" width="4" height="4" fill="#a8f0fc"/>
  <rect x="41" y="27" width="4" height="4" fill="#a8f0fc"/>
  <!-- Lower crystal body -->
  <rect x="14" y="32" width="20" height="10" fill="#4cd8e0"/>
  <rect x="16" y="33" width="16" height="2" fill="#7ce0ec"/>
  <rect x="16" y="38" width="16" height="3" fill="#3aa8b0"/>
  <!-- Crystal stalagmite base -->
  <rect x="18" y="42" width="12" height="4" fill="#3aa8b0"/>
  <rect x="20" y="46" width="8" height="2" fill="#1a3050"/>
  <!-- Sparkles -->
  <rect x="6" y="10" width="1" height="1" fill="#ffffff"/>
  <rect x="42" y="14" width="1" height="1" fill="#ffffff"/>
  <rect x="10" y="34" width="1" height="1" fill="#ffffff"/>
  <rect x="38" y="36" width="1" height="1" fill="#ffffff"/>
</svg>
