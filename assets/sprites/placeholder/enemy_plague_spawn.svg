  <rect x="28" y="22" width="4" height="3" fill="#502838"/>
  <rect x="27" y="25" width="3" height="3" fill="#502838"/>
  <!-- Drops -->
  <rect x="7" y="28" width="2" height="3" fill="#902040"/>
  <rect x="23" y="28" width="2" height="3" fill="#902040"/>
  <rect x="15" y="29" width="2" height="2" fill="#902040"/>
