  <rect x="2" y="14" width="28" height="10" fill="#502838"/>
  <rect x="6" y="8" width="20" height="3" fill="#702838"/>
  <!-- Veiny membrane -->
  <rect x="6" y="12" width="20" height="2" fill="#902040"/>
  <rect x="4" y="18" width="24" height="2" fill="#902040"/>
  <rect x="6" y="22" width="20" height="2" fill="#902040"/>
  <!-- Many eyes -->
  <rect x="8" y="13" width="3" height="3" fill="#a8e860"/>
  <rect x="14" y="11" width="3" height="3" fill="#a8e860"/>
  <rect x="20" y="13" width="3" height="3" fill="#a8e860"/>
  <rect x="11" y="18" width="3" height="3" fill="#a8e860"/>
  <rect x="18" y="18" width="3" height="3" fill="#a8e860"/>
  <rect x="9" y="14" width="1" height="1" fill="#1a1015"/>
  <rect x="15" y="12" width="1" height="1" fill="#1a1015"/>
  <rect x="21" y="14" width="1" height="1" fill="#1a1015"/>
  <rect x="12" y="19" width="1" height="1" fill="#1a1015"/>
  <rect x="19" y="19" width="1" height="1" fill="#1a1015"/>
  <!-- Mouths -->
  <rect x="10" y="22" width="4" height="2" fill="#1a1015"/>
