<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Storm aura -->
  <rect x="4" y="6" width="24" height="20" fill="#a8e8ff" opacity="0.15"/>
  <rect x="2" y="10" width="28" height="14" fill="#a8e8ff" opacity="0.1"/>
  <!-- Lightning sparks -->
  <rect x="2" y="14" width="2" height="3" fill="#fff8a0"/>
  <rect x="28" y="12" width="2" height="3" fill="#fff8a0"/>
  <rect x="6" y="4" width="1" height="3" fill="#fff8a0"/>
  <rect x="25" y="22" width="1" height="3" fill="#fff8a0"/>
  <!-- Wings (electric blue) -->
  <rect x="2" y="12" width="6" height="3" fill="#3a6ab8"/>
  <rect x="0" y="14" width="6" height="3" fill="#3a6ab8"/>
  <rect x="24" y="12" width="6" height="3" fill="#3a6ab8"/>
  <rect x="26" y="14" width="6" height="3" fill="#3a6ab8"/>
  <!-- Wing highlights -->
  <rect x="3" y="13" width="3" height="1" fill="#7aaae8"/>
  <rect x="26" y="13" width="3" height="1" fill="#7aaae8"/>
  <!-- Body -->
  <rect x="10" y="8" width="12" height="14" fill="#4a4068"/>
  <rect x="11" y="9" width="10" height="2" fill="#6a5a90"/>
  <!-- Head plumage -->
  <rect x="11" y="4" width="10" height="4" fill="#7050a0"/>
  <rect x="13" y="2" width="6" height="2" fill="#7050a0"/>
  <!-- Eyes (electric) -->
  <rect x="12" y="10" width="3" height="2" fill="#fff8a0"/>
  <rect x="17" y="10" width="3" height="2" fill="#fff8a0"/>
  <rect x="13" y="11" width="1" height="1" fill="#1a1033"/>
  <rect x="18" y="11" width="1" height="1" fill="#1a1033"/>
  <!-- Beak -->
  <rect x="14" y="13" width="4" height="2" fill="#f0d050"/>
  <!-- Lightning chest mark -->
  <rect x="15" y="15" width="2" height="2" fill="#fff8a0"/>
  <rect x="14" y="17" width="2" height="2" fill="#fff8a0"/>
  <rect x="16" y="19" width="2" height="2" fill="#fff8a0"/>
  <!-- Talons -->
  <rect x="10" y="22" width="4" height="6" fill="#3a3a45"/>
  <rect x="18" y="22" width="4" height="6" fill="#3a3a45"/>
  <rect x="9" y="28" width="6" height="2" fill="#1a1015"/>
  <rect x="17" y="28" width="6" height="2" fill="#1a1015"/>
</svg>
