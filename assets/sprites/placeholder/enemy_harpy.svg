<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Wings spread -->
  <rect x="0" y="10" width="6" height="3" fill="#a07050"/>
  <rect x="2" y="13" width="4" height="3" fill="#a07050"/>
  <rect x="0" y="13" width="2" height="2" fill="#704028"/>
  <rect x="26" y="10" width="6" height="3" fill="#a07050"/>
  <rect x="26" y="13" width="4" height="3" fill="#a07050"/>
  <rect x="30" y="13" width="2" height="2" fill="#704028"/>
  <rect x="1" y="11" width="3" height="1" fill="#c08868"/>
  <rect x="28" y="11" width="3" height="1" fill="#c08868"/>
  <!-- Head -->
  <rect x="11" y="2" width="10" height="6" fill="#e8b890"/>
  <rect x="9" y="3" width="4" height="3" fill="#3a2010"/>
  <rect x="19" y="3" width="4" height="3" fill="#3a2010"/>
  <!-- Eyes -->
  <rect x="13" y="4" width="2" height="2" fill="#ff6030"/>
  <rect x="17" y="4" width="2" height="2" fill="#ff6030"/>
  <!-- Beak -->
  <rect x="14" y="6" width="4" height="2" fill="#f5d76e"/>
  <rect x="14" y="8" width="4" height="1" fill="#a07020"/>
  <!-- Body / feathered torso -->
  <rect x="10" y="9" width="12" height="9" fill="#a07050"/>
  <rect x="11" y="10" width="10" height="2" fill="#c08868"/>
  <rect x="12" y="13" width="8" height="3" fill="#704028"/>
  <!-- Talons -->
  <rect x="9" y="22" width="4" height="6" fill="#5a3210"/>
  <rect x="19" y="22" width="4" height="6" fill="#5a3210"/>
  <rect x="8" y="28" width="6" height="2" fill="#3a2010"/>
  <rect x="18" y="28" width="6" height="2" fill="#3a2010"/>
  <!-- Tail feathers -->
  <rect x="13" y="18" width="6" height="4" fill="#704028"/>
  <rect x="14" y="18" width="4" height="2" fill="#a07050"/>
</svg>
