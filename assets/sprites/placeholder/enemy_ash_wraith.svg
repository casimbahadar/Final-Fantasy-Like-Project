<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Ash trail -->
  <rect x="8" y="26" width="16" height="4" fill="#604850" opacity="0.5"/>
  <rect x="12" y="30" width="8" height="2" fill="#604850" opacity="0.3"/>
  <!-- Ashen wisp body -->
  <rect x="8" y="6" width="16" height="22" fill="#7a6065"/>
  <rect x="6" y="10" width="20" height="14" fill="#7a6065"/>
  <rect x="10" y="4" width="12" height="4" fill="#7a6065"/>
  <!-- Highlights -->
  <rect x="10" y="8" width="12" height="2" fill="#a08085"/>
  <rect x="9" y="14" width="14" height="2" fill="#a08085"/>
  <!-- Eyes (burning embers) -->
  <rect x="11" y="11" width="3" height="3" fill="#ff6030"/>
  <rect x="18" y="11" width="3" height="3" fill="#ff6030"/>
  <rect x="12" y="12" width="1" height="1" fill="#ffe080"/>
  <rect x="19" y="12" width="1" height="1" fill="#ffe080"/>
  <!-- Mouth (glowing crack) -->
  <rect x="12" y="17" width="8" height="2" fill="#ff6030"/>
  <rect x="13" y="17" width="6" height="1" fill="#ffe080"/>
  <!-- Drifting tendrils -->
  <rect x="6" y="18" width="2" height="6" fill="#7a6065" opacity="0.6"/>
  <rect x="24" y="18" width="2" height="6" fill="#7a6065" opacity="0.6"/>
  <rect x="14" y="24" width="4" height="4" fill="#7a6065"/>
  <!-- Sparks -->
  <rect x="3" y="12" width="1" height="1" fill="#ffe080"/>
  <rect x="28" y="16" width="1" height="1" fill="#ffe080"/>
  <rect x="4" y="20" width="1" height="1" fill="#ffe080"/>
</svg>
