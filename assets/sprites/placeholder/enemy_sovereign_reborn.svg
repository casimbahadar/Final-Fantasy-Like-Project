<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Halo of corrupted light -->
  <rect x="0" y="0" width="32" height="32" fill="#3a3050" opacity="0.2"/>
  <rect x="2" y="2" width="28" height="28" fill="#604070" opacity="0.25"/>
  <!-- Towering robed body -->
  <rect x="6" y="6" width="20" height="22" fill="#0a0a1a"/>
  <rect x="4" y="10" width="2" height="18" fill="#0a0a1a"/>
  <rect x="26" y="10" width="2" height="18" fill="#0a0a1a"/>
  <rect x="7" y="7" width="18" height="2" fill="#5a4a78"/>
  <rect x="7" y="14" width="18" height="1" fill="#3a2a58"/>
  <rect x="7" y="22" width="18" height="1" fill="#3a2a58"/>
  <!-- Crown of dead light -->
  <rect x="9" y="0" width="14" height="3" fill="#a08040"/>
  <rect x="9" y="1" width="2" height="3" fill="#ffe060"/>
  <rect x="13" y="1" width="2" height="3" fill="#ffe060"/>
  <rect x="17" y="1" width="2" height="3" fill="#ffe060"/>
  <rect x="21" y="1" width="2" height="3" fill="#ffe060"/>
  <!-- Mask: half gold, half black -->
  <rect x="11" y="4" width="5" height="6" fill="#d8b850"/>
  <rect x="16" y="4" width="5" height="6" fill="#1a1a1a"/>
  <!-- Eyes (one gold, one void) -->
  <rect x="12" y="6" width="2" height="2" fill="#fff080"/>
  <rect x="18" y="6" width="2" height="2" fill="#000000"/>
  <!-- Crack across mask -->
  <rect x="15" y="4" width="1" height="6" fill="#3a2a3a"/>
  <!-- Twin swords (light + dark) -->
  <rect x="2" y="5" width="2" height="20" fill="#ffe080"/>
  <rect x="1" y="5" width="4" height="2" fill="#a8702a"/>
  <rect x="28" y="5" width="2" height="20" fill="#1a0a30"/>
  <rect x="27" y="5" width="4" height="2" fill="#3a1a4a"/>
  <!-- Orb at chest -->
  <rect x="14" y="16" width="4" height="4" fill="#601a40"/>
  <rect x="15" y="17" width="2" height="2" fill="#ff80a0"/>
</svg>
