<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Tar pool -->
  <rect x="2" y="26" width="28" height="6" fill="#3a2010"/>
  <rect x="0" y="29" width="32" height="3" fill="#1a1010"/>
  <!-- Body emerging -->
  <rect x="8" y="14" width="16" height="14" fill="#3a2810"/>
  <rect x="6" y="18" width="20" height="10" fill="#3a2810"/>
  <!-- Highlights (oily) -->
  <rect x="9" y="16" width="14" height="2" fill="#5a4020"/>
  <rect x="7" y="21" width="18" height="2" fill="#5a4020"/>
  <!-- Burning eyes -->
  <rect x="11" y="18" width="3" height="3" fill="#ff6030"/>
  <rect x="18" y="18" width="3" height="3" fill="#ff6030"/>
  <rect x="12" y="19" width="1" height="1" fill="#ffe080"/>
  <rect x="19" y="19" width="1" height="1" fill="#ffe080"/>
  <!-- Mouth dripping -->
  <rect x="12" y="22" width="8" height="3" fill="#1a1010"/>
  <rect x="13" y="25" width="2" height="2" fill="#3a2810"/>
  <rect x="17" y="25" width="2" height="2" fill="#3a2810"/>
  <!-- Drooping arms -->
  <rect x="2" y="20" width="6" height="3" fill="#3a2810"/>
  <rect x="0" y="22" width="4" height="3" fill="#3a2810"/>
  <rect x="24" y="20" width="6" height="3" fill="#3a2810"/>
  <rect x="28" y="22" width="4" height="3" fill="#3a2810"/>
  <!-- Crooked teeth -->
  <rect x="13" y="22" width="1" height="2" fill="#e8e0d0"/>
  <rect x="16" y="22" width="1" height="2" fill="#e8e0d0"/>
  <rect x="19" y="22" width="1" height="2" fill="#e8e0d0"/>
  <!-- Embers floating -->
  <rect x="4" y="10" width="1" height="1" fill="#ff6030"/>
  <rect x="28" y="14" width="1" height="1" fill="#ff6030"/>
  <rect x="14" y="6" width="1" height="1" fill="#ffe080"/>
  <rect x="20" y="8" width="1" height="1" fill="#ff6030"/>
</svg>
