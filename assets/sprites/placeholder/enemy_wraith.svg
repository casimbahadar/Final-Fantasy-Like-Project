<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Trailing ghost wisp -->
  <rect x="8" y="22" width="16" height="6" fill="#5a608a" opacity="0.4"/>
  <rect x="10" y="25" width="12" height="3" fill="#5a608a" opacity="0.3"/>
  <rect x="12" y="28" width="8" height="2" fill="#5a608a" opacity="0.2"/>
  <!-- Cloak -->
  <rect x="6" y="6" width="20" height="18" fill="#3a3a55"/>
  <rect x="4" y="10" width="4" height="14" fill="#3a3a55"/>
  <rect x="24" y="10" width="4" height="14" fill="#3a3a55"/>
  <rect x="7" y="7" width="18" height="2" fill="#5a5a78"/>
  <!-- Hood -->
  <rect x="8" y="3" width="16" height="6" fill="#2a2a3f"/>
  <rect x="10" y="2" width="12" height="2" fill="#2a2a3f"/>
  <!-- Inside hood = void -->
  <rect x="10" y="6" width="12" height="6" fill="#0a0510"/>
  <!-- Glowing eyes -->
  <rect x="12" y="8" width="3" height="2" fill="#a8e860"/>
  <rect x="17" y="8" width="3" height="2" fill="#a8e860"/>
  <rect x="13" y="9" width="1" height="1" fill="#ffffff"/>
  <rect x="18" y="9" width="1" height="1" fill="#ffffff"/>
  <!-- Bony hand emerging -->
  <rect x="2" y="14" width="4" height="2" fill="#e8e0d0"/>
  <rect x="3" y="13" width="1" height="1" fill="#e8e0d0"/>
  <rect x="2" y="16" width="1" height="1" fill="#e8e0d0"/>
  <!-- Tattered hem -->
  <rect x="8" y="22" width="2" height="2" fill="#3a3a55"/>
  <rect x="14" y="22" width="2" height="2" fill="#3a3a55"/>
  <rect x="20" y="22" width="2" height="2" fill="#3a3a55"/>
</svg>
