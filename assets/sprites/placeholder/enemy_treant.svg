<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Canopy -->
  <rect x="6" y="0" width="36" height="6" fill="#2a6020"/>
  <rect x="2" y="4" width="44" height="6" fill="#3a7030"/>
  <rect x="6" y="10" width="36" height="4" fill="#2a6020"/>
  <rect x="10" y="2" width="6" height="2" fill="#4a8040"/>
  <rect x="32" y="2" width="6" height="2" fill="#4a8040"/>
  <rect x="20" y="0" width="8" height="2" fill="#4a8040"/>
  <!-- Trunk body -->
  <rect x="14" y="14" width="20" height="24" fill="#5a3a20"/>
  <rect x="12" y="18" width="24" height="18" fill="#5a3a20"/>
  <rect x="16" y="16" width="16" height="3" fill="#7a5028"/>
  <!-- Bark texture -->
  <rect x="14" y="22" width="20" height="1" fill="#3a2010"/>
  <rect x="14" y="26" width="20" height="1" fill="#3a2010"/>
  <rect x="14" y="30" width="20" height="1" fill="#3a2010"/>
  <rect x="14" y="34" width="20" height="1" fill="#3a2010"/>
  <!-- Glowing eyes -->
  <rect x="18" y="22" width="3" height="3" fill="#a8e860"/>
  <rect x="27" y="22" width="3" height="3" fill="#a8e860"/>
  <rect x="19" y="23" width="1" height="1" fill="#ffffff"/>
  <rect x="28" y="23" width="1" height="1" fill="#ffffff"/>
  <!-- Hollow mouth -->
  <rect x="20" y="28" width="8" height="4" fill="#1a1015"/>
  <rect x="22" y="29" width="2" height="2" fill="#3a2010"/>
  <rect x="25" y="30" width="2" height="2" fill="#3a2010"/>
  <!-- Branch arms -->
  <rect x="2" y="20" width="10" height="3" fill="#5a3a20"/>
  <rect x="0" y="22" width="6" height="3" fill="#5a3a20"/>
  <rect x="36" y="20" width="10" height="3" fill="#5a3a20"/>
  <rect x="42" y="22" width="6" height="3" fill="#5a3a20"/>
  <rect x="0" y="20" width="2" height="2" fill="#3a7030"/>
  <rect x="46" y="20" width="2" height="2" fill="#3a7030"/>
