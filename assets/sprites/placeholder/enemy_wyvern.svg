  <rect x="34" y="14" width="14" height="3" fill="#5a4030"/>
  <rect x="38" y="17" width="10" height="4" fill="#5a4030"/>
  <rect x="38" y="21" width="8" height="3" fill="#5a4030"/>
  <rect x="2" y="15" width="10" height="1" fill="#806040"/>
  <rect x="36" y="15" width="10" height="1" fill="#806040"/>
