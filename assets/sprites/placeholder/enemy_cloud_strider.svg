<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Cloud aura -->
  <rect x="4" y="6" width="24" height="22" fill="#e0e8f0" opacity="0.5"/>
  <rect x="2" y="14" width="28" height="10" fill="#c8d4e0" opacity="0.4"/>
  <!-- Body (long, vapor-like) -->
  <rect x="10" y="4" width="12" height="8" fill="#a0b8d0"/>
  <rect x="8" y="8" width="16" height="6" fill="#a0b8d0"/>
  <rect x="11" y="2" width="10" height="3" fill="#c8d4e0"/>
  <!-- Highlights -->
  <rect x="11" y="5" width="10" height="2" fill="#e0e8f0"/>
  <!-- Eyes -->
  <rect x="13" y="7" width="2" height="2" fill="#1a1015"/>
  <rect x="17" y="7" width="2" height="2" fill="#1a1015"/>
  <rect x="13" y="7" width="1" height="1" fill="#a8e8ff"/>
  <rect x="17" y="7" width="1" height="1" fill="#a8e8ff"/>
  <!-- Mouth (faint) -->
  <rect x="14" y="11" width="4" height="1" fill="#5a6878"/>
  <!-- Wispy "legs" -->
  <rect x="10" y="14" width="3" height="10" fill="#a0b8d0"/>
  <rect x="14" y="14" width="3" height="12" fill="#a0b8d0"/>
  <rect x="18" y="14" width="3" height="10" fill="#a0b8d0"/>
  <rect x="11" y="18" width="2" height="2" fill="#c8d4e0"/>
  <rect x="15" y="20" width="2" height="2" fill="#c8d4e0"/>
  <rect x="19" y="18" width="2" height="2" fill="#c8d4e0"/>
  <!-- Trail wisps -->
  <rect x="6" y="18" width="3" height="3" fill="#c8d4e0" opacity="0.7"/>
  <rect x="23" y="18" width="3" height="3" fill="#c8d4e0" opacity="0.7"/>
  <!-- Drips -->
  <rect x="12" y="26" width="2" height="3" fill="#a0b8d0" opacity="0.6"/>
  <rect x="18" y="26" width="2" height="3" fill="#a0b8d0" opacity="0.6"/>
</svg>
