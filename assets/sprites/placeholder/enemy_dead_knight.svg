<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Shadow -->
  <rect x="6" y="29" width="20" height="2" fill="#1a1015" opacity="0.5"/>
  <!-- Helm with closed visor -->
  <rect x="9" y="2" width="14" height="9" fill="#404856"/>
  <rect x="10" y="3" width="12" height="2" fill="#5a6275"/>
  <rect x="11" y="11" width="10" height="2" fill="#404856"/>
  <!-- Plume (royal red) -->
  <rect x="13" y="0" width="6" height="2" fill="#a02030"/>
  <!-- Visor crack with red glow -->
  <rect x="11" y="6" width="10" height="3" fill="#1a1015"/>
  <rect x="13" y="7" width="3" height="1" fill="#ff3030"/>
  <rect x="16" y="7" width="3" height="1" fill="#ff3030"/>
  <!-- Royal cape behind -->
  <rect x="6" y="11" width="20" height="14" fill="#702030"/>
  <rect x="6" y="11" width="20" height="2" fill="#a04050"/>
  <!-- Breastplate (rusted) -->
  <rect x="9" y="13" width="14" height="11" fill="#5a4838"/>
  <rect x="10" y="14" width="12" height="2" fill="#806848"/>
  <rect x="14" y="16" width="4" height="6" fill="#3a3025"/>
  <!-- Royal crest -->
  <rect x="15" y="17" width="2" height="3" fill="#f5d76e"/>
  <!-- Belt -->
  <rect x="9" y="22" width="14" height="2" fill="#3a2010"/>
  <!-- Bastard sword (huge two-hander) -->
  <rect x="2" y="14" width="3" height="14" fill="#8a8a98"/>
  <rect x="1" y="13" width="5" height="2" fill="#5a3210"/>
  <rect x="3" y="9" width="1" height="6" fill="#a0a0b0"/>
  <!-- Greaves -->
  <rect x="10" y="24" width="4" height="5" fill="#404856"/>
  <rect x="18" y="24" width="4" height="5" fill="#404856"/>
</svg>
