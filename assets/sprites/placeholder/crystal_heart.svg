<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" shape-rendering="crispEdges">
  <!-- Glow halo -->
  <rect x="6" y="2" width="12" height="22" fill="#a8e8ff" opacity="0.3"/>
  <rect x="4" y="6" width="16" height="14" fill="#4cd8e0" opacity="0.25"/>
  <!-- Crystal body (diamond-ish) -->
  <rect x="10" y="2" width="4" height="2" fill="#e0fcff"/>
  <rect x="8" y="4" width="8" height="2" fill="#a8e8ff"/>
  <rect x="6" y="6" width="12" height="3" fill="#7ce0ec"/>
  <rect x="4" y="9" width="16" height="6" fill="#4cd8e0"/>
  <rect x="6" y="15" width="12" height="3" fill="#7ce0ec"/>
  <rect x="8" y="18" width="8" height="2" fill="#a8e8ff"/>
  <rect x="10" y="20" width="4" height="2" fill="#e0fcff"/>
  <!-- Highlight -->
  <rect x="10" y="6" width="2" height="6" fill="#ffffff" opacity="0.6"/>
  <rect x="11" y="9" width="1" height="3" fill="#ffffff"/>
  <!-- Pedestal -->
  <rect x="2" y="22" width="20" height="3" fill="#4a3068"/>
  <rect x="0" y="25" width="24" height="4" fill="#2a1840"/>
  <rect x="2" y="29" width="20" height="3" fill="#1a0830"/>
</svg>
