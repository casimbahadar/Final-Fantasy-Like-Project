<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Reflection shimmer -->
  <rect x="2" y="6" width="28" height="36" fill="#5a3078" opacity="0.25"/>
  <!-- Hollow halo -->
  <rect x="6" y="0" width="20" height="2" fill="#5a3078" opacity="0.6"/>
  <rect x="4" y="2" width="24" height="2" fill="#5a3078" opacity="0.4"/>
  <!-- Hair (now black instead of brown) -->
  <rect x="8" y="4" width="16" height="6" fill="#1a0820"/>
  <!-- Face (pale, hollow) -->
  <rect x="9" y="10" width="14" height="6" fill="#a890c0"/>
  <!-- Eyes (empty pits, faint glow) -->
  <rect x="11" y="12" width="3" height="3" fill="#0a0510"/>
  <rect x="18" y="12" width="3" height="3" fill="#0a0510"/>
  <rect x="12" y="13" width="1" height="1" fill="#a8e860"/>
  <rect x="19" y="13" width="1" height="1" fill="#a8e860"/>
  <!-- Tunic — same shape as Aldric, but inverted purple/black -->
  <rect x="8" y="16" width="16" height="14" fill="#3a1058"/>
  <rect x="8" y="16" width="16" height="3" fill="#5a2080"/>
  <!-- Belt -->
  <rect x="8" y="24" width="16" height="2" fill="#1a0820"/>
  <!-- Inverted color sword (blade dark, hilt purple) -->
  <rect x="2" y="20" width="3" height="14" fill="#1a0820"/>
  <rect x="0" y="18" width="7" height="3" fill="#5a3078"/>
  <rect x="3" y="14" width="1" height="6" fill="#3a1058"/>
  <!-- Crack-of-light through chest -->
  <rect x="14" y="20" width="4" height="2" fill="#a8e860" opacity="0.7"/>
  <rect x="15" y="17" width="2" height="6" fill="#a8e860" opacity="0.4"/>
  <!-- Legs -->
  <rect x="10" y="30" width="5" height="10" fill="#1a0820"/>
  <rect x="17" y="30" width="5" height="10" fill="#1a0820"/>
  <!-- Boots -->
  <rect x="9" y="40" width="7" height="3" fill="#0a0510"/>
  <rect x="16" y="40" width="7" height="3" fill="#0a0510"/>
  <!-- Mirrored shadow -->
  <rect x="6" y="44" width="20" height="3" fill="#5a3078" opacity="0.4"/>
  <rect x="8" y="46" width="16" height="2" fill="#5a3078" opacity="0.3"/>
</svg>
