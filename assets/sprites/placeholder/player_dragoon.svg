<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 28" shape-rendering="crispEdges">
  <!-- Spear extends above head -->
  <rect x="13" y="0" width="1" height="22" fill="#5a3210"/>
  <rect x="12" y="0" width="3" height="2" fill="#a0a0b0"/>
  <rect x="13" y="2" width="1" height="2" fill="#a0a0b0"/>
  <!-- Helmet with horn -->
  <rect x="3" y="2" width="10" height="4" fill="#5a6075"/>
  <rect x="4" y="3" width="8" height="2" fill="#7a8090"/>
  <rect x="6" y="0" width="2" height="2" fill="#5a6075"/>
  <rect x="9" y="0" width="2" height="2" fill="#5a6075"/>
  <!-- Visor slits -->
  <rect x="5" y="6" width="2" height="1" fill="#1a1033"/>
  <rect x="9" y="6" width="2" height="1" fill="#1a1033"/>
  <!-- Face peeking under helmet -->
  <rect x="5" y="7" width="6" height="2" fill="#e8b890"/>
  <!-- Body / cuirass -->
  <rect x="3" y="9" width="10" height="8" fill="#3a5070"/>
  <rect x="4" y="10" width="8" height="2" fill="#5a7090"/>
  <rect x="6" y="12" width="4" height="3" fill="#a0a0b0"/>
  <!-- Wing-like cape on shoulders -->
  <rect x="0" y="9" width="3" height="6" fill="#7090b8"/>
  <rect x="13" y="9" width="3" height="6" fill="#7090b8"/>
  <rect x="0" y="9" width="1" height="1" fill="#a8c0e0"/>
  <rect x="15" y="9" width="1" height="1" fill="#a8c0e0"/>
  <!-- Belt -->
  <rect x="3" y="16" width="10" height="1" fill="#1a1015"/>
  <!-- Skirt of armor -->
  <rect x="3" y="17" width="10" height="3" fill="#3a5070"/>
  <rect x="3" y="20" width="10" height="1" fill="#1a1015"/>
  <!-- Legs -->
  <rect x="5" y="21" width="3" height="5" fill="#5a6075"/>
  <rect x="8" y="21" width="3" height="5" fill="#5a6075"/>
  <!-- Boots -->
  <rect x="4" y="26" width="4" height="2" fill="#1a1015"/>
  <rect x="8" y="26" width="4" height="2" fill="#1a1015"/>
</svg>
