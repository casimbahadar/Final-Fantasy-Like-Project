<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Shadow -->
  <rect x="6" y="44" width="36" height="3" fill="#1a1015" opacity="0.4"/>
  <!-- Robe lower -->
  <rect x="8" y="28" width="32" height="16" fill="#3a2058"/>
  <rect x="6" y="38" width="36" height="6" fill="#4a3068"/>
  <rect x="10" y="30" width="28" height="2" fill="#5a4080"/>
  <!-- Robe upper -->
  <rect x="14" y="14" width="20" height="16" fill="#4a2870"/>
  <rect x="16" y="16" width="16" height="2" fill="#6a4090"/>
  <!-- Sleeves -->
  <rect x="8" y="20" width="6" height="14" fill="#3a2058"/>
  <rect x="34" y="20" width="6" height="14" fill="#3a2058"/>
  <!-- Hood -->
  <rect x="14" y="6" width="20" height="10" fill="#2a1040"/>
  <rect x="12" y="10" width="24" height="6" fill="#2a1040"/>
  <!-- Inside hood = darkness -->
  <rect x="16" y="12" width="16" height="8" fill="#0a0010"/>
  <!-- Glowing eyes -->
  <rect x="18" y="14" width="3" height="3" fill="#4cd8e0"/>
  <rect x="27" y="14" width="3" height="3" fill="#4cd8e0"/>
  <rect x="19" y="15" width="1" height="1" fill="#ffffff"/>
  <rect x="28" y="15" width="1" height="1" fill="#ffffff"/>
  <!-- Crystal floating in hand -->
  <rect x="36" y="22" width="6" height="2" fill="#a8e8ff"/>
  <rect x="35" y="24" width="8" height="6" fill="#4cd8e0"/>
  <rect x="36" y="30" width="6" height="2" fill="#a8e8ff"/>
  <rect x="38" y="26" width="2" height="2" fill="#ffffff"/>
  <!-- Crystal sparkles -->
  <rect x="33" y="20" width="1" height="1" fill="#ffffff"/>
  <rect x="44" y="28" width="1" height="1" fill="#ffffff"/>
</svg>
