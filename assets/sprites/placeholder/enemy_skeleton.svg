<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Shadow -->
  <rect x="6" y="29" width="20" height="2" fill="#1a1015" opacity="0.4"/>
  <!-- Skull -->
  <rect x="9" y="3" width="14" height="8" fill="#e8e0d0"/>
  <rect x="10" y="4" width="12" height="2" fill="#ffffff"/>
  <!-- Eye sockets (hollow black) -->
  <rect x="11" y="6" width="3" height="3" fill="#1a1015"/>
  <rect x="18" y="6" width="3" height="3" fill="#1a1015"/>
  <rect x="12" y="7" width="1" height="1" fill="#ff6030"/>
  <rect x="19" y="7" width="1" height="1" fill="#ff6030"/>
  <!-- Teeth -->
  <rect x="12" y="9" width="8" height="2" fill="#1a1015"/>
  <rect x="13" y="9" width="1" height="2" fill="#e8e0d0"/>
  <rect x="15" y="9" width="1" height="2" fill="#e8e0d0"/>
  <rect x="17" y="9" width="1" height="2" fill="#e8e0d0"/>
  <rect x="19" y="9" width="1" height="2" fill="#e8e0d0"/>
  <!-- Spine -->
  <rect x="15" y="11" width="2" height="11" fill="#e8e0d0"/>
  <!-- Ribs -->
  <rect x="11" y="13" width="10" height="1" fill="#e8e0d0"/>
  <rect x="11" y="15" width="10" height="1" fill="#e8e0d0"/>
  <rect x="11" y="17" width="10" height="1" fill="#e8e0d0"/>
  <!-- Arms -->
  <rect x="6" y="13" width="3" height="1" fill="#e8e0d0"/>
  <rect x="23" y="13" width="3" height="1" fill="#e8e0d0"/>
  <rect x="5" y="14" width="2" height="6" fill="#e8e0d0"/>
  <rect x="25" y="14" width="2" height="6" fill="#e8e0d0"/>
  <!-- Sword -->
  <rect x="3" y="15" width="2" height="9" fill="#a0a0b0"/>
  <rect x="2" y="14" width="4" height="2" fill="#5a3210"/>
  <!-- Pelvis + legs -->
  <rect x="11" y="22" width="10" height="3" fill="#e8e0d0"/>
  <rect x="12" y="25" width="3" height="4" fill="#e8e0d0"/>
  <rect x="17" y="25" width="3" height="4" fill="#e8e0d0"/>
