<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Wind streams swirling -->
  <rect x="0" y="14" width="64" height="3" fill="#a0c0e0" opacity="0.4"/>
  <rect x="0" y="22" width="64" height="2" fill="#a0c0e0" opacity="0.3"/>
  <rect x="0" y="36" width="64" height="2" fill="#a0c0e0" opacity="0.3"/>
  <rect x="0" y="46" width="64" height="3" fill="#a0c0e0" opacity="0.4"/>
  <!-- Wing-like robe / form -->
  <rect x="0" y="20" width="14" height="20" fill="#c8d8e8"/>
  <rect x="50" y="20" width="14" height="20" fill="#c8d8e8"/>
  <rect x="2" y="22" width="10" height="2" fill="#e8e8f8"/>
  <rect x="52" y="22" width="10" height="2" fill="#e8e8f8"/>
  <!-- Body (translucent / spectral) -->
  <rect x="14" y="14" width="36" height="36" fill="#a0b8d8"/>
  <rect x="16" y="16" width="32" height="3" fill="#c8d4e0"/>
  <!-- Hollow form / cloak edges -->
  <rect x="14" y="50" width="36" height="6" fill="#7a90b0"/>
  <rect x="18" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="22" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="26" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="30" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="34" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="38" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="42" y="56" width="2" height="4" fill="#7a90b0"/>
  <rect x="46" y="56" width="2" height="4" fill="#7a90b0"/>
  <!-- Face / mask area -->
  <rect x="22" y="20" width="20" height="14" fill="#7a90b0"/>
  <rect x="24" y="22" width="16" height="2" fill="#a0b8d8"/>
  <!-- Hollow eyes (singing) -->
  <rect x="25" y="24" width="4" height="4" fill="#0a0510"/>
  <rect x="35" y="24" width="4" height="4" fill="#0a0510"/>
  <rect x="26" y="25" width="2" height="2" fill="#fff8a0"/>
  <rect x="36" y="25" width="2" height="2" fill="#fff8a0"/>
  <!-- Open singing mouth (vortex) -->
  <rect x="26" y="30" width="12" height="4" fill="#1a1838"/>
  <rect x="28" y="31" width="8" height="2" fill="#3a3858"/>
  <rect x="30" y="32" width="4" height="1" fill="#7a78a8"/>
  <!-- Music notes -->
  <rect x="6" y="8" width="2" height="3" fill="#fff8a0"/>
  <rect x="56" y="6" width="2" height="3" fill="#fff8a0"/>
  <rect x="32" y="4" width="2" height="3" fill="#fff8a0"/>
  <!-- Crystal pendant -->
  <rect x="30" y="38" width="4" height="6" fill="#7ce0ec"/>
  <rect x="31" y="39" width="2" height="3" fill="#a8f0fc"/>
  <!-- Trailing vapor below -->
  <rect x="20" y="60" width="24" height="3" fill="#a0c0e0" opacity="0.5"/>
  <rect x="24" y="62" width="16" height="2" fill="#a0c0e0" opacity="0.4"/>
</svg>
