<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Water/seaweed trail -->
  <rect x="6" y="28" width="20" height="2" fill="#2a4060" opacity="0.5"/>
  <rect x="4" y="22" width="2" height="6" fill="#3a6080" opacity="0.4"/>
  <rect x="26" y="22" width="2" height="6" fill="#3a6080" opacity="0.4"/>
  <!-- Tattered sailor coat -->
  <rect x="9" y="11" width="14" height="14" fill="#3a4858"/>
  <rect x="10" y="12" width="12" height="2" fill="#5a6878"/>
  <!-- Shoulders / armor scraps -->
  <rect x="7" y="11" width="3" height="6" fill="#5a6878"/>
  <rect x="22" y="11" width="3" height="6" fill="#5a6878"/>
  <!-- Bloated head (pale blue) -->
  <rect x="11" y="3" width="10" height="8" fill="#a0b8c0"/>
  <rect x="12" y="4" width="8" height="2" fill="#c0d0d8"/>
  <!-- Sunken eyes -->
  <rect x="13" y="6" width="2" height="2" fill="#1a1015"/>
  <rect x="17" y="6" width="2" height="2" fill="#1a1015"/>
  <rect x="13" y="6" width="1" height="1" fill="#a8e860"/>
  <rect x="17" y="6" width="1" height="1" fill="#a8e860"/>
  <!-- Lipless grin -->
  <rect x="13" y="9" width="6" height="1" fill="#1a1015"/>
  <rect x="14" y="9" width="1" height="1" fill="#e8e0d0"/>
  <rect x="16" y="9" width="1" height="1" fill="#e8e0d0"/>
  <rect x="18" y="9" width="1" height="1" fill="#e8e0d0"/>
  <!-- Seaweed dripping -->
  <rect x="8" y="14" width="2" height="3" fill="#3a6020"/>
  <rect x="22" y="14" width="2" height="3" fill="#3a6020"/>
  <rect x="14" y="2" width="2" height="2" fill="#3a6020"/>
  <!-- Cutlass -->
  <rect x="2" y="16" width="2" height="8" fill="#a0a0b0"/>
  <rect x="0" y="14" width="6" height="3" fill="#604030"/>
  <!-- Belt -->
  <rect x="9" y="19" width="14" height="2" fill="#1a1015"/>
  <!-- Legs (waterlogged trousers) -->
  <rect x="11" y="21" width="3" height="7" fill="#2a3848"/>
  <rect x="18" y="21" width="3" height="7" fill="#2a3848"/>
  <!-- Feet -->
  <rect x="10" y="28" width="5" height="2" fill="#1a1015"/>
  <rect x="17" y="28" width="5" height="2" fill="#1a1015"/>
</svg>
