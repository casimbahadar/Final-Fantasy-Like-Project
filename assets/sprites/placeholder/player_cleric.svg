<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 24" shape-rendering="crispEdges">
  <!-- Halo -->
  <rect x="5" y="0" width="6" height="1" fill="#f5d76e" opacity="0.7"/>
  <rect x="3" y="1" width="10" height="1" fill="#f5d76e" opacity="0.5"/>
  <!-- Hood / hair -->
  <rect x="3" y="2" width="10" height="3" fill="#d8b878"/>
  <rect x="2" y="3" width="2" height="5" fill="#d8b878"/>
  <rect x="12" y="3" width="2" height="5" fill="#d8b878"/>
  <!-- Face -->
  <rect x="5" y="5" width="6" height="4" fill="#f0c79a"/>
  <rect x="6" y="6" width="1" height="1" fill="#1a1033"/>
  <rect x="9" y="6" width="1" height="1" fill="#1a1033"/>
  <rect x="7" y="8" width="2" height="1" fill="#a04060"/>
  <!-- Robe upper (white with gold trim) -->
  <rect x="3" y="9" width="10" height="9" fill="#e8e0c8"/>
  <rect x="4" y="10" width="8" height="2" fill="#ffffff"/>
  <!-- Cross / sun emblem -->
  <rect x="7" y="12" width="2" height="4" fill="#f5d76e"/>
  <rect x="6" y="13" width="4" height="2" fill="#f5d76e"/>
  <!-- Robe lower with gold band -->
  <rect x="3" y="17" width="10" height="2" fill="#f5d76e"/>
  <rect x="3" y="19" width="10" height="3" fill="#e8e0c8"/>
  <!-- Boots -->
  <rect x="4" y="22" width="4" height="2" fill="#1a1015"/>
  <rect x="8" y="22" width="4" height="2" fill="#1a1015"/>
</svg>
