<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Sand swirl base -->
  <rect x="2" y="22" width="28" height="6" fill="#c8a868" opacity="0.6"/>
  <rect x="6" y="20" width="20" height="4" fill="#a08850" opacity="0.5"/>
  <!-- Body (shifting sand humanoid) -->
  <rect x="10" y="6" width="12" height="18" fill="#b89868"/>
  <rect x="8" y="10" width="16" height="12" fill="#b89868"/>
  <rect x="12" y="4" width="8" height="4" fill="#d8b878"/>
  <!-- Highlights -->
  <rect x="11" y="8" width="10" height="2" fill="#e8c898"/>
  <rect x="10" y="14" width="12" height="2" fill="#e8c898"/>
  <!-- Hollow eyes -->
  <rect x="13" y="9" width="2" height="2" fill="#1a1015"/>
  <rect x="17" y="9" width="2" height="2" fill="#1a1015"/>
  <rect x="13" y="9" width="1" height="1" fill="#f8d878"/>
  <rect x="17" y="9" width="1" height="1" fill="#f8d878"/>
  <!-- Mouth (sand pour) -->
  <rect x="14" y="13" width="4" height="3" fill="#705028"/>
  <!-- Trailing sand arms -->
  <rect x="4" y="14" width="6" height="3" fill="#a08850"/>
  <rect x="22" y="14" width="6" height="3" fill="#a08850"/>
  <rect x="2" y="17" width="4" height="2" fill="#b89868"/>
  <rect x="26" y="17" width="4" height="2" fill="#b89868"/>
  <!-- Sand particles -->
  <rect x="0" y="10" width="1" height="1" fill="#e8c898"/>
  <rect x="31" y="14" width="1" height="1" fill="#e8c898"/>
  <rect x="3" y="6" width="1" height="1" fill="#e8c898"/>
  <rect x="28" y="8" width="1" height="1" fill="#e8c898"/>
</svg>
