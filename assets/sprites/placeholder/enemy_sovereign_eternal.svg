<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Holy radiance backdrop -->
  <rect x="0" y="0" width="64" height="64" fill="#7a6090" opacity="0.2"/>
  <rect x="6" y="2" width="52" height="60" fill="#a890c0" opacity="0.2"/>
  <!-- Halo (six-pointed) -->
  <rect x="20" y="0" width="24" height="2" fill="#fff8a0"/>
  <rect x="16" y="2" width="32" height="2" fill="#fff8a0"/>
  <rect x="14" y="4" width="36" height="2" fill="#f5d76e"/>
  <rect x="32" y="0" width="2" height="6" fill="#fff8a0"/>
  <!-- Crown of light -->
  <rect x="18" y="6" width="28" height="3" fill="#f5d76e"/>
  <rect x="22" y="4" width="2" height="3" fill="#f5d76e"/>
  <rect x="28" y="2" width="2" height="5" fill="#f5d76e"/>
  <rect x="32" y="0" width="2" height="7" fill="#fff8a0"/>
  <rect x="36" y="2" width="2" height="5" fill="#f5d76e"/>
  <rect x="42" y="4" width="2" height="3" fill="#f5d76e"/>
  <!-- Crown jewels -->
  <rect x="28" y="3" width="2" height="2" fill="#a8e8ff"/>
  <rect x="36" y="3" width="2" height="2" fill="#a8e8ff"/>
  <rect x="32" y="2" width="2" height="2" fill="#7ce0ec"/>
  <!-- Face (regal, calm) -->
  <rect x="22" y="9" width="20" height="14" fill="#f0c79a"/>
  <rect x="23" y="10" width="18" height="2" fill="#f8d8b0"/>
  <!-- Long pale beard -->
  <rect x="22" y="20" width="20" height="9" fill="#e8e0d0"/>
  <rect x="24" y="22" width="16" height="2" fill="#ffffff"/>
  <rect x="20" y="24" width="24" height="3" fill="#e8e0d0"/>
  <!-- Closed-eye serenity (eyes painted softly) -->
  <rect x="25" y="14" width="4" height="1" fill="#3a2010"/>
  <rect x="35" y="14" width="4" height="1" fill="#3a2010"/>
  <!-- Tear of light -->
  <rect x="26" y="16" width="1" height="2" fill="#a8e8ff"/>
  <!-- Calm mouth -->
  <rect x="29" y="18" width="6" height="1" fill="#a04060"/>
  <!-- Cape / mantle (white and gold) -->
  <rect x="14" y="22" width="36" height="22" fill="#e8e0d0"/>
  <rect x="14" y="22" width="36" height="3" fill="#f5d76e"/>
  <rect x="16" y="25" width="32" height="2" fill="#f5d76e"/>
  <!-- Robe with light-pattern -->
  <rect x="18" y="29" width="28" height="13" fill="#a890c0"/>
  <rect x="20" y="30" width="24" height="3" fill="#c8b0e0"/>
  <!-- Crystal medallion -->
  <rect x="29" y="33" width="6" height="6" fill="#7ce0ec"/>
  <rect x="30" y="34" width="4" height="4" fill="#a8f0fc"/>
  <rect x="31" y="35" width="2" height="2" fill="#ffffff"/>
  <!-- Sleeves -->
  <rect x="10" y="30" width="6" height="14" fill="#a890c0"/>
  <rect x="48" y="30" width="6" height="14" fill="#a890c0"/>
  <rect x="10" y="29" width="6" height="3" fill="#f5d76e"/>
  <rect x="48" y="29" width="6" height="3" fill="#f5d76e"/>
  <!-- Folded hands at center -->
  <rect x="26" y="40" width="12" height="6" fill="#f0c79a"/>
  <rect x="28" y="42" width="8" height="2" fill="#f8d8b0"/>
  <!-- Skirt of mantle (long) -->
  <rect x="14" y="44" width="36" height="14" fill="#a890c0"/>
  <rect x="14" y="44" width="36" height="3" fill="#f5d76e"/>
  <rect x="14" y="56" width="36" height="2" fill="#f5d76e"/>
  <!-- Light radiating from below -->
  <rect x="12" y="58" width="40" height="3" fill="#fff8a0" opacity="0.6"/>
  <rect x="8" y="61" width="48" height="3" fill="#fff8a0" opacity="0.4"/>
  <!-- Floating light motes -->
  <rect x="2" y="20" width="2" height="2" fill="#fff8a0"/>
  <rect x="60" y="14" width="2" height="2" fill="#fff8a0"/>
  <rect x="6" y="50" width="2" height="2" fill="#fff8a0"/>
  <rect x="56" y="46" width="2" height="2" fill="#fff8a0"/>
  <rect x="2" y="40" width="1" height="1" fill="#a8e8ff"/>
  <rect x="62" y="36" width="1" height="1" fill="#a8e8ff"/>
</svg>
