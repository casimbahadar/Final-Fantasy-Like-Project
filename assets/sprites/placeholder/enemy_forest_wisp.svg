<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Outer glow -->
  <rect x="6" y="10" width="20" height="14" fill="#a8e8ff" opacity="0.25"/>
  <rect x="9" y="7" width="14" height="20" fill="#a8e8ff" opacity="0.3"/>
  <!-- Core orb -->
  <rect x="11" y="11" width="10" height="10" fill="#7ce0ec"/>
  <rect x="9" y="13" width="14" height="6" fill="#7ce0ec" opacity="0.7"/>
  <rect x="13" y="9" width="6" height="14" fill="#7ce0ec" opacity="0.7"/>
  <rect x="12" y="12" width="8" height="8" fill="#a8f0fc"/>
  <rect x="14" y="14" width="4" height="4" fill="#ffffff"/>
  <!-- Eyes (hollow voids in the glow) -->
  <rect x="13" y="13" width="2" height="2" fill="#1a1033"/>
  <rect x="17" y="13" width="2" height="2" fill="#1a1033"/>
  <!-- Trailing wisps -->
  <rect x="14" y="22" width="2" height="3" fill="#7ce0ec" opacity="0.6"/>
  <rect x="16" y="23" width="2" height="3" fill="#7ce0ec" opacity="0.4"/>
</svg>
