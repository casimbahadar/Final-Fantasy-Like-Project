<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Cyclone bands (concentric rings of wind) -->
  <rect x="4" y="4" width="24" height="24" fill="#80c8e8" opacity="0.25"/>
  <rect x="6" y="6" width="20" height="20" fill="#a8e0f0" opacity="0.35"/>
  <rect x="8" y="8" width="16" height="16" fill="#c0e8f8" opacity="0.5"/>
  <rect x="10" y="10" width="12" height="12" fill="#e0f0f8" opacity="0.6"/>
  <!-- Spiral arms -->
  <rect x="2" y="14" width="6" height="2" fill="#5090c0"/>
  <rect x="24" y="14" width="6" height="2" fill="#5090c0"/>
  <rect x="14" y="2" width="2" height="6" fill="#5090c0"/>
  <rect x="14" y="24" width="2" height="6" fill="#5090c0"/>
  <rect x="6" y="6" width="2" height="2" fill="#5090c0"/>
  <rect x="24" y="6" width="2" height="2" fill="#5090c0"/>
  <rect x="6" y="24" width="2" height="2" fill="#5090c0"/>
  <rect x="24" y="24" width="2" height="2" fill="#5090c0"/>
  <!-- Eye of the cyclone -->
  <rect x="14" y="14" width="4" height="4" fill="#1a3050"/>
  <rect x="15" y="15" width="2" height="2" fill="#80e0ff"/>
  <!-- Lightning flickers -->
  <rect x="11" y="11" width="1" height="1" fill="#ffe080"/>
  <rect x="20" y="20" width="1" height="1" fill="#ffe080"/>
  <rect x="20" y="11" width="1" height="1" fill="#ffe080"/>
  <rect x="11" y="20" width="1" height="1" fill="#ffe080"/>
</svg>
