<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Shadow -->
  <rect x="1" y="14" width="14" height="2" fill="#1a1015" opacity="0.4"/>
  <!-- Box body -->
  <rect x="1" y="6" width="14" height="9" fill="#6a4030"/>
  <rect x="2" y="7" width="12" height="2" fill="#8a5840"/>
  <!-- Inside -->
  <rect x="2" y="6" width="12" height="6" fill="#1a1015"/>
  <!-- Lid (tilted back) -->
  <rect x="1" y="0" width="14" height="2" fill="#7a4830"/>
  <rect x="1" y="2" width="14" height="2" fill="#8a5840"/>
  <!-- Bands -->
  <rect x="3" y="6" width="1" height="9" fill="#3a2010"/>
  <rect x="12" y="6" width="1" height="9" fill="#3a2010"/>
  <!-- Glow inside -->
  <rect x="4" y="8" width="8" height="3" fill="#f5d76e" opacity="0.5"/>
</svg>
