<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Halo of pale light -->
  <rect x="2" y="2" width="28" height="28" fill="#fff0c8" opacity="0.15"/>
  <rect x="4" y="4" width="24" height="24" fill="#fff8d0" opacity="0.2"/>
  <!-- Cloaked king-shape, reformed -->
  <rect x="8" y="8" width="16" height="20" fill="#1a1a3a"/>
  <rect x="6" y="12" width="2" height="14" fill="#1a1a3a"/>
  <rect x="24" y="12" width="2" height="14" fill="#1a1a3a"/>
  <rect x="9" y="9" width="14" height="2" fill="#5a5a78"/>
  <!-- Crown-of-glass (broken) -->
  <rect x="10" y="3" width="12" height="3" fill="#ffe060"/>
  <rect x="10" y="2" width="2" height="2" fill="#ffe060"/>
  <rect x="14" y="2" width="2" height="2" fill="#ffe060"/>
  <rect x="18" y="2" width="2" height="2" fill="#ffe060"/>
  <rect x="22" y="2" width="2" height="2" fill="#ffe060"/>
  <!-- Mask -->
  <rect x="11" y="6" width="10" height="6" fill="#e8e0c0"/>
  <!-- Eyes (white-out, light leaking) -->
  <rect x="13" y="8" width="2" height="2" fill="#ffffff"/>
  <rect x="17" y="8" width="2" height="2" fill="#ffffff"/>
  <rect x="13" y="9" width="2" height="1" fill="#fff0a0"/>
  <rect x="17" y="9" width="2" height="1" fill="#fff0a0"/>
  <!-- Sword of glass -->
  <rect x="3" y="6" width="2" height="20" fill="#a8d8ff"/>
  <rect x="2" y="6" width="4" height="3" fill="#5090c8"/>
  <rect x="3" y="5" width="2" height="2" fill="#ffffff"/>
  <!-- Robe runes -->
  <rect x="14" y="20" width="1" height="3" fill="#fff0a0"/>
  <rect x="17" y="20" width="1" height="3" fill="#fff0a0"/>
</svg>
