<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 24" shape-rendering="crispEdges">
  <!-- Hat (merchant cap) -->
  <rect x="3" y="2" width="10" height="3" fill="#3a6090"/>
  <rect x="2" y="5" width="12" height="1" fill="#3a6090"/>
  <!-- Face -->
  <rect x="5" y="6" width="6" height="4" fill="#e8b890"/>
  <rect x="6" y="7" width="1" height="1" fill="#1a1033"/>
  <rect x="9" y="7" width="1" height="1" fill="#1a1033"/>
  <!-- Mustache -->
  <rect x="6" y="9" width="4" height="1" fill="#5a3210"/>
  <!-- Body / vest -->
  <rect x="4" y="10" width="8" height="7" fill="#a06030"/>
  <rect x="6" y="11" width="4" height="6" fill="#604030"/>
  <!-- Belt -->
  <rect x="4" y="14" width="8" height="1" fill="#1a1015"/>
  <!-- Coin pouch hint -->
  <rect x="11" y="13" width="2" height="3" fill="#f5d76e"/>
  <!-- Legs -->
  <rect x="5" y="17" width="3" height="5" fill="#403028"/>
  <rect x="8" y="17" width="3" height="5" fill="#403028"/>
  <rect x="4" y="22" width="4" height="2" fill="#1a1015"/>
  <rect x="8" y="22" width="4" height="2" fill="#1a1015"/>
</svg>
