<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Trailing wisp -->
  <rect x="8" y="22" width="16" height="6" fill="#a8c0d8" opacity="0.4"/>
  <rect x="10" y="26" width="12" height="4" fill="#a8c0d8" opacity="0.3"/>
  <rect x="12" y="30" width="8" height="2" fill="#a8c0d8" opacity="0.25"/>
  <!-- Dress (pale, tattered) -->
  <rect x="9" y="14" width="14" height="14" fill="#d8c8e0"/>
  <rect x="11" y="15" width="10" height="2" fill="#f0e0f8"/>
  <rect x="9" y="20" width="14" height="1" fill="#a890b0"/>
  <!-- Sash / belt -->
  <rect x="9" y="20" width="14" height="2" fill="#7050a0"/>
  <!-- Shoulders -->
  <rect x="7" y="14" width="3" height="6" fill="#d8c8e0"/>
  <rect x="22" y="14" width="3" height="6" fill="#d8c8e0"/>
  <!-- Head -->
  <rect x="11" y="4" width="10" height="9" fill="#e8d8f0"/>
  <rect x="12" y="5" width="8" height="2" fill="#f8e8ff"/>
  <!-- Hair (long, pale) -->
  <rect x="9" y="3" width="14" height="2" fill="#e8d8f0"/>
  <rect x="9" y="5" width="2" height="10" fill="#e8d8f0"/>
  <rect x="21" y="5" width="2" height="10" fill="#e8d8f0"/>
  <!-- Empty eyes -->
  <rect x="13" y="7" width="2" height="2" fill="#1a1015"/>
  <rect x="17" y="7" width="2" height="2" fill="#1a1015"/>
  <rect x="13" y="7" width="1" height="1" fill="#a8e8ff"/>
  <rect x="17" y="7" width="1" height="1" fill="#a8e8ff"/>
  <!-- Sad mouth -->
  <rect x="14" y="11" width="4" height="1" fill="#3a2030"/>
  <!-- Hands clasped -->
  <rect x="13" y="16" width="6" height="4" fill="#e8d8f0"/>
  <!-- Floating wedding band -->
  <rect x="16" y="17" width="2" height="2" fill="#f5d76e"/>
  <!-- Tear of light -->
  <rect x="14" y="11" width="1" height="3" fill="#a8e8ff" opacity="0.7"/>
</svg>
