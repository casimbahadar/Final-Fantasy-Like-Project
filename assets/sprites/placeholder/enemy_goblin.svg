<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Shadow -->
  <rect x="6" y="29" width="20" height="2" fill="#1a1015" opacity="0.4"/>
  <!-- Ears -->
  <rect x="6" y="6" width="3" height="6" fill="#5a7040"/>
  <rect x="23" y="6" width="3" height="6" fill="#5a7040"/>
  <!-- Head -->
  <rect x="9" y="4" width="14" height="10" fill="#7a9050"/>
  <rect x="10" y="5" width="12" height="2" fill="#9ab070"/>
  <!-- Eyes -->
  <rect x="11" y="8" width="3" height="2" fill="#ff3030"/>
  <rect x="18" y="8" width="3" height="2" fill="#ff3030"/>
  <!-- Mouth + fangs -->
  <rect x="12" y="11" width="8" height="2" fill="#1a1015"/>
  <rect x="13" y="13" width="1" height="2" fill="#ffffff"/>
  <rect x="18" y="13" width="1" height="2" fill="#ffffff"/>
  <!-- Body -->
  <rect x="9" y="14" width="14" height="10" fill="#604030"/>
  <rect x="10" y="15" width="12" height="2" fill="#805040"/>
  <!-- Belt -->
  <rect x="9" y="20" width="14" height="2" fill="#3a2010"/>
  <!-- Arms -->
  <rect x="5" y="15" width="4" height="8" fill="#7a9050"/>
  <rect x="23" y="15" width="4" height="8" fill="#7a9050"/>
  <!-- Club in hand -->
  <rect x="2" y="13" width="3" height="3" fill="#5a3210"/>
  <rect x="3" y="16" width="2" height="8" fill="#5a3210"/>
  <!-- Legs -->
  <rect x="10" y="24" width="4" height="5" fill="#7a9050"/>
  <rect x="18" y="24" width="4" height="5" fill="#7a9050"/>
  <!-- Feet -->
  <rect x="9" y="28" width="6" height="1" fill="#1a1015"/>
  <rect x="17" y="28" width="6" height="1" fill="#1a1015"/>
</svg>
