  <rect x="8" y="29" width="16" height="2" fill="#1a1015" opacity="0.4"/>
  <!-- Leaf hat -->
  <rect x="9" y="3" width="14" height="2" fill="#2a6020"/>
  <rect x="7" y="5" width="18" height="3" fill="#3a7030"/>
  <rect x="10" y="5" width="2" height="3" fill="#4a8040"/>
  <rect x="20" y="5" width="2" height="3" fill="#4a8040"/>
  <!-- Body -->
  <rect x="10" y="8" width="12" height="14" fill="#a07a40"/>
  <rect x="11" y="9" width="10" height="3" fill="#c0a060"/>
  <!-- Face -->
  <rect x="12" y="11" width="2" height="2" fill="#1a1033"/>
  <rect x="18" y="11" width="2" height="2" fill="#1a1033"/>
