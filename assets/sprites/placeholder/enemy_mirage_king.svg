<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Heat shimmer -->
  <rect x="0" y="20" width="64" height="40" fill="#f8d878" opacity="0.15"/>
  <rect x="6" y="10" width="52" height="50" fill="#f8a058" opacity="0.1"/>
  <!-- Faint duplicate (mirage offset) -->
  <rect x="12" y="14" width="40" height="40" fill="#a06028" opacity="0.25"/>
  <!-- Crown of sun-rays -->
  <rect x="22" y="0" width="20" height="3" fill="#f5d76e"/>
  <rect x="20" y="3" width="24" height="3" fill="#f5d76e"/>
  <rect x="24" y="0" width="2" height="3" fill="#ff8030"/>
  <rect x="30" y="0" width="2" height="3" fill="#ff8030"/>
  <rect x="36" y="0" width="2" height="3" fill="#ff8030"/>
  <rect x="42" y="0" width="2" height="3" fill="#ff8030"/>
  <!-- Halo glow -->
  <rect x="16" y="6" width="32" height="2" fill="#f5d76e" opacity="0.5"/>
  <!-- Face (golden, blank) -->
  <rect x="22" y="8" width="20" height="14" fill="#f8d878"/>
  <rect x="24" y="9" width="16" height="2" fill="#fff8b0"/>
  <!-- Empty bright eyes -->
  <rect x="25" y="13" width="4" height="3" fill="#fff8b0"/>
  <rect x="35" y="13" width="4" height="3" fill="#fff8b0"/>
  <rect x="26" y="14" width="2" height="1" fill="#a06000"/>
  <rect x="36" y="14" width="2" height="1" fill="#a06000"/>
  <!-- Stylized mouth -->
  <rect x="28" y="18" width="8" height="2" fill="#a06000"/>
  <!-- Royal robes (orange/gold) -->
  <rect x="14" y="22" width="36" height="22" fill="#a06028"/>
  <rect x="16" y="24" width="32" height="3" fill="#c87838"/>
  <rect x="18" y="22" width="28" height="2" fill="#f5d76e"/>
  <!-- Sun emblem on chest -->
  <rect x="28" y="28" width="8" height="8" fill="#f5d76e"/>
  <rect x="30" y="30" width="4" height="4" fill="#fff8b0"/>
  <!-- Sleeves -->
  <rect x="6" y="24" width="8" height="14" fill="#a06028"/>
  <rect x="50" y="24" width="8" height="14" fill="#a06028"/>
  <rect x="8" y="26" width="6" height="2" fill="#c87838"/>
  <rect x="50" y="26" width="6" height="2" fill="#c87838"/>
  <!-- Phantom hands (mirage) -->
  <rect x="2" y="34" width="6" height="6" fill="#f8d878" opacity="0.7"/>
  <rect x="56" y="34" width="6" height="6" fill="#f8d878" opacity="0.7"/>
  <!-- Sceptre with sun -->
  <rect x="58" y="20" width="2" height="22" fill="#a06028"/>
  <rect x="55" y="16" width="8" height="6" fill="#f5d76e"/>
  <rect x="57" y="18" width="4" height="2" fill="#fff8b0"/>
  <!-- Belt -->
  <rect x="14" y="42" width="36" height="3" fill="#7a3010"/>
  <rect x="28" y="41" width="8" height="5" fill="#f5d76e"/>
  <!-- Lower robe -->
  <rect x="14" y="45" width="36" height="13" fill="#a06028"/>
  <rect x="14" y="56" width="36" height="2" fill="#f5d76e"/>
  <!-- Ground heat distortion -->
  <rect x="10" y="60" width="44" height="3" fill="#f8a058" opacity="0.5"/>
  <rect x="6" y="63" width="52" height="1" fill="#f8a058" opacity="0.4"/>
</svg>
