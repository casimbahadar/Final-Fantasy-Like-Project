<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Helm with mausoleum-style ridge -->
  <rect x="8" y="2" width="16" height="8" fill="#404048"/>
  <rect x="9" y="3" width="14" height="2" fill="#5a5a68"/>
  <rect x="14" y="0" width="4" height="3" fill="#a08020"/>
  <!-- Visor (sealed) -->
  <rect x="10" y="6" width="12" height="3" fill="#1a1015"/>
  <rect x="13" y="7" width="2" height="1" fill="#a8e860"/>
  <rect x="17" y="7" width="2" height="1" fill="#a8e860"/>
  <!-- Pauldrons -->
  <rect x="4" y="10" width="6" height="6" fill="#404048"/>
  <rect x="22" y="10" width="6" height="6" fill="#404048"/>
  <rect x="5" y="11" width="4" height="2" fill="#606068"/>
  <rect x="23" y="11" width="4" height="2" fill="#606068"/>
  <!-- Body / heavy mail -->
  <rect x="9" y="10" width="14" height="14" fill="#606068"/>
  <rect x="10" y="11" width="12" height="2" fill="#808088"/>
  <!-- Mail rings pattern -->
  <rect x="10" y="14" width="12" height="1" fill="#404048"/>
  <rect x="10" y="17" width="12" height="1" fill="#404048"/>
  <rect x="10" y="20" width="12" height="1" fill="#404048"/>
  <!-- Royal sigil on chest -->
  <rect x="14" y="13" width="4" height="6" fill="#a08020"/>
  <rect x="15" y="14" width="2" height="4" fill="#1a1015"/>
  <!-- Spear (vertical, behind) -->
  <rect x="0" y="14" width="3" height="2" fill="#a0a0b0"/>
  <rect x="0" y="12" width="2" height="2" fill="#a0a0b0"/>
  <rect x="3" y="14" width="2" height="14" fill="#5a3210"/>
  <!-- Gauntlets -->
  <rect x="6" y="20" width="4" height="4" fill="#404048"/>
  <rect x="22" y="20" width="4" height="4" fill="#404048"/>
  <!-- Skirt of mail -->
  <rect x="9" y="24" width="14" height="3" fill="#404048"/>
  <!-- Greaves -->
  <rect x="11" y="27" width="4" height="4" fill="#404048"/>
  <rect x="17" y="27" width="4" height="4" fill="#404048"/>
</svg>
